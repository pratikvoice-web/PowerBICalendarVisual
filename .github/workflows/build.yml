name: Compile Power BI Visual

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-pbiviz:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Stable Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Project Dependencies
      run: npm install

    - name: Fix Global Compiler Tools Permissions
      run: |
        sudo mkdir -p /usr/local/lib/node_modules/powerbi-visuals-tools/certs
        sudo chmod -R 777 /usr/local/lib/node_modules/

    - name: Compile and Package Visual Payload
      run: npx pbiviz package

    - name: Upload Compiled Visual Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Advanced-Calendar-Grid-Visual
        path: dist/*.pbiviz
        if-no-files-found: error
        retention-days: 14
