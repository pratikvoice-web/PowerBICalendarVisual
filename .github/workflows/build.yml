name: Compile Power BI Visual

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-pbiviz:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Aligned Node.js 18 Runtime
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Project Dependencies
      run: npm install

    - name: Compile and Package Visual Payload
      run: npx pbiviz package

    - name: Upload Compiled Visual Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calendar-Grid-Pro-Visual
        path: dist/*.pbiviz
        if-no-files-found: error
        retention-days: 14
